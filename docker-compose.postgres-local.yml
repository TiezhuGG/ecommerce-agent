services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-agent-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_local_data:
